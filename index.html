<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Start Kids - Premium</title>
    
    <!-- Font Khas Kanak-Kanak (Fredoka) -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            margin: 0; padding: 0; 
            font-family: 'Fredoka', sans-serif; 
            background-color: #f0fdf4;
            background-image: radial-gradient(#cbd5e1 2px, transparent 2px);
            background-size: 30px 30px;
        }

        /* Animasi */
        @keyframes bounce-slow { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(5%); } }
        .animate-bounce-slow { animation: bounce-slow 3s ease-in-out infinite; }
        
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes float-up { 0% { transform: translateY(100vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }
        
        /* Butang 3D Premium */
        .btn-3d {
            transition: all 0.1s ease;
            box-shadow: 0 8px 0 rgba(0,0,0,0.15);
        }
        .btn-3d:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 rgba(0,0,0,0.15);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 12px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SISTEM AUDIO PREMIUM ---
        const speakText = (text, rate = 0.85) => {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ms-MY';
            utterance.rate = rate;
            utterance.pitch = 1.3; // Suara lebih ceria
            window.speechSynthesis.speak(utterance);
        };

        // --- DATA PENDIDIKAN KSPK (Diperbetul & Diperluas) ---
        
        // Modul 1: Nama Huruf Standard (A, Bi, Si...)
        const LETTER_NAMES = [
            { l: 'A', name: 'A', w: [{w: 'Ayam', i: '🐔'}, {w: 'Api', i: '🔥'}] },
            { l: 'B', name: 'Bi', w: [{w: 'Buku', i: '📖'}, {w: 'Bola', i: '⚽'}] },
            { l: 'C', name: 'Si', w: [{w: 'Cawan', i: '☕'}, {w: 'Cincin', i: '💍'}] },
            { l: 'D', name: 'Di', w: [{w: 'Dadu', i: '🎲'}, {w: 'Daun', i: '🍃'}] },
            { l: 'E', name: 'I', w: [{w: 'Epal', i: '🍎'}, {w: 'Emak', i: '👩'}] },
            { l: 'F', name: 'Ef', w: [{w: 'Feri', i: '⛴️'}, {w: 'Foto', i: '🖼️'}] },
            { l: 'G', name: 'Ji', w: [{w: 'Gajah', i: '🐘'}, {w: 'Gigi', i: '🦷'}] },
            { l: 'H', name: 'Hec', w: [{w: 'Hutan', i: '🌲'}] },
            { l: 'I', name: 'Ai', w: [{w: 'Ikan', i: '🐟'}] },
            { l: 'J', name: 'Je', w: [{w: 'Jari', i: '🖐️'}] },
            { l: 'K', name: 'Ke', w: [{w: 'Kucing', i: '🐈'}] },
            { l: 'L', name: 'El', w: [{w: 'Lembu', i: '🐄'}] },
            { l: 'M', name: 'Em', w: [{w: 'Mata', i: '👁️'}] },
            { l: 'N', name: 'En', w: [{w: 'Nasi', i: '🍚'}] },
            { l: 'O', name: 'O', w: [{w: 'Otak', i: '🧠'}] },
            { l: 'P', name: 'Pi', w: [{w: 'Pokok', i: '🌳'}] },
            { l: 'Q', name: 'Kiu', w: [{w: 'Quran', i: '📖'}] },
            { l: 'R', name: 'Ar', w: [{w: 'Rusa', i: '🦌'}] },
            { l: 'S', name: 'Es', w: [{w: 'Siput', i: '🐌'}] },
            { l: 'T', name: 'Ti', w: [{w: 'Topi', i: '🧢'}] },
            { l: 'U', name: 'Yu', w: [{w: 'Ular', i: '🐍'}] },
            { l: 'V', name: 'Vi', w: [{w: 'Van', i: '🚐'}] },
            { l: 'W', name: 'Dabliu', w: [{w: 'Wau', i: '🪁'}] },
            { l: 'X', name: 'Eks', w: [{w: 'X-ray', i: '🦴'}] },
            { l: 'Y', name: 'Wai', w: [{w: 'Yoyo', i: '🪀'}] },
            { l: 'Z', name: 'Zed', w: [{w: 'Zirafah', i: '🦒'}] }
        ];

        // Modul 2: Fonik (E-pepet dan E-taling diasingkan)
        const PHONICS_DATA = [
            { l: 'a', sound: 'aah', desc: 'Buka mulut luas' },
            { l: 'b', sound: 'beh', desc: 'Bibir rapat lalu buka' },
            { l: 'c', sound: 'ceh', desc: 'Senyum dan sebut' },
            { l: 'd', sound: 'deh', desc: 'Lidah di lelangit' },
            { l: 'e', sound: 'eh', desc: 'E-Pepet (Contoh: Emak)' },
            { l: 'é', sound: 'eh', desc: 'E-Taling (Contoh: Epal)' },
            { l: 'f', sound: 'feh', desc: 'Gigi atas kena bibir bawah' },
            { l: 'g', sound: 'geh', desc: 'Dari kerongkong' },
            { l: 'h', sound: 'heh', desc: 'Hembus nafas' },
            { l: 'i', sound: 'eee', desc: 'Senyum tarik bibir' },
            { l: 'j', sound: 'jeh', desc: 'Muncung sikit' },
            { l: 'k', sound: 'keh', desc: 'Bunyi di kerongkong' },
            { l: 'm', sound: 'emmm', desc: 'Rapat bibir degung' },
            { l: 's', sound: 'ssss', desc: 'Bunyi ular' },
            { l: 'u', sound: 'ooo', desc: 'Muncungkan bibir' }
        ];

        // Modul 3: Suku Kata & Cerita Pendek (Sangat Diperluas)
        const SYLLABLE_DATA = [
            { s: 'ba', words: [{w: 'baju', i: '👕'}, {w: 'batu', i: '🪨'}], story: "Ini baju baru bapa. Bapa beli baju biru di kedai." },
            { s: 'bi', words: [{w: 'biji', i: '🍉'}, {w: 'biru', i: '🔵'}], story: "Bibi ada biji tembikai. Bibi tanam biji di tepi batu." },
            { s: 'bu', words: [{w: 'buku', i: '📖'}, {w: 'bulan', i: '🌙'}], story: "Abu suka baca buku. Abu baca buku waktu malam ada bulan." },
            { s: 'ca', words: [{w: 'cawan', i: '☕'}, {w: 'catur', i: '♟️'}], story: "Cici cuci cawan. Cici minum susu dalam cawan." },
            { s: 'ci', words: [{w: 'cili', i: '🌶️'}, {w: 'cicak', i: '🦎'}], story: "Cicak makan nyamuk. Cili itu sangat pedas!" },
            { s: 'cu', words: [{w: 'cucu', i: '👶'}, {w: 'cuci', i: '🧼'}], story: "Cucu tolong nenek cuci baju. Baju cucu sudah bersih." },
            { s: 'da', words: [{w: 'dadu', i: '🎲'}, {w: 'dagu', i: '🧔'}], story: "Didi ada dadu. Didi main dadu sama kawan." },
            { s: 'di', words: [{w: 'diri', i: '🧍'}, {w: 'dinding', i: '🧱'}], story: "Adik berdiri tepi dinding. Adik sudah tinggi." }
        ];

        const COURSE_DATA = {
            m1: {
                id: 'm1', title: 'Kenal ABC', type: 'letter', color: 'bg-rose-400', 
                content: LETTER_NAMES.map(item => ({ letter: item.l, sound: item.name, words: item.w })),
                quiz: [
                    { q: 'Manakah huruf A?', opt: ['B', 'A', 'M'], a: 'A' },
                    { q: 'Pilih huruf C', opt: ['C', 'G', 'O'], a: 'C' }
                ]
            },
            m2: {
                id: 'm2', title: 'Bunyi Fonik', type: 'phonics', color: 'bg-cyan-400', requires: 'm1',
                content: PHONICS_DATA.map(item => ({ letter: item.l, sound: item.sound, desc: item.desc })),
                quiz: [
                    { q: 'Huruf apakah berbunyi "Beh"?', opt: ['A', 'D', 'B'], a: 'B' },
                    { q: 'Huruf apakah berbunyi "Mmm"?', opt: ['M', 'S', 'K'], a: 'M' }
                ]
            },
            m3: {
                id: 'm3', title: 'Suku Kata & Cerita', type: 'syllable', color: 'bg-amber-400', requires: 'm2',
                content: SYLLABLE_DATA.map(item => ({ syllable: item.s, words: item.words, story: item.story })),
                quiz: [
                    { q: 'Pilih suku kata "ba"', opt: ['ca', 'ba', 'da'], a: 'ba' },
                    { q: 'Pilih suku kata "cu"', opt: ['ci', 'cu', 'bu'], a: 'cu' }
                ]
            }
        };

        const MODULE_ORDER = ['m1', 'm2', 'm3'];

        // --- KOMPONEN PELAJARAN PREMIUM ---
        const LessonViewer = ({ module, onComplete, onExit }) => {
            const [phase, setPhase] = useState('grid');
            const [activeItem, setActiveItem] = useState(null);
            const [quizScore, setQuizScore] = useState(0);
            const [quizIndex, setQuizIndex] = useState(0);

            useEffect(() => {
                if (phase === 'grid') speakText(`Mari belajar ${module.title}. Pilih kad!`);
                else if (phase === 'quiz') speakText("Mari kita uji minda!");
                else if (phase === 'result') {
                    const pass = Math.round((quizScore / module.quiz.length) * 100) >= 80;
                    speakText(pass ? "Wah, pandainya! Tahniah." : "Jangan putus asa, cuba lagi.");
                }
            }, [phase]);

            useEffect(() => {
                if (phase === 'detail' && activeItem) {
                    if (module.type === 'letter') speakText(`Huruf ${activeItem.letter}. Sebutannya, ${activeItem.sound}`);
                    else if (module.type === 'phonics') speakText(`Bunyi ${activeItem.sound}`);
                    else if (module.type === 'syllable') speakText(`Suku kata, ${activeItem.syllable}`);
                }
            }, [activeItem, phase]);

            const handleQuizAnswer = (answer) => {
                const isCorrect = (answer === module.quiz[quizIndex].a);
                if (isCorrect) {
                    speakText("Betul!");
                    setQuizScore(prev => prev + 1);
                } else {
                    speakText("Salah.");
                }

                setTimeout(() => {
                    if (quizIndex < module.quiz.length - 1) setQuizIndex(prev => prev + 1);
                    else setPhase('result');
                }, 1000);
            };

            return (
                <div className="w-full min-h-screen p-4 md:p-8 flex flex-col items-center">
                    {/* Header Modul */}
                    <div className="w-full max-w-5xl flex justify-between items-center mb-8 bg-white p-4 rounded-[2rem] shadow-lg border-b-4 border-gray-200">
                        <div className="flex items-center space-x-4">
                            <button onClick={onExit} className="btn-3d bg-gray-100 p-4 rounded-2xl text-2xl">🚪 Keluar</button>
                            <h1 className="text-3xl font-bold text-gray-800 ml-4">{module.title}</h1>
                        </div>
                    </div>

                    {/* FASA GRID KAD */}
                    {phase === 'grid' && (
                        <div className="w-full max-w-5xl animate-pop">
                            <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-4">
                                {module.content.map((item, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => { setActiveItem(item); setPhase('detail'); }}
                                        className={`btn-3d ${module.color} text-white rounded-[2rem] aspect-square flex items-center justify-center text-5xl font-black border-4 border-white`}
                                    >
                                        {item.letter || item.syllable}
                                    </button>
                                ))}
                            </div>
                            <div className="flex justify-center mt-12">
                                <button onClick={() => { setQuizScore(0); setQuizIndex(0); setPhase('quiz'); }} className="btn-3d bg-indigo-500 text-white px-12 py-6 rounded-full font-black text-3xl">
                                    🎮 Mula Kuiz!
                                </button>
                            </div>
                        </div>
                    )}

                    {/* FASA DETAIL & CERITA PENDEK */}
                    {phase === 'detail' && activeItem && (
                        <div className="w-full max-w-4xl animate-pop flex flex-col items-center">
                            <button onClick={() => setPhase('grid')} className="btn-3d bg-white px-8 py-4 rounded-full font-bold text-xl mb-6 text-gray-700">⬅️ Kembali</button>
                            
                            <div className="bg-white rounded-[3rem] p-10 shadow-2xl border-b-8 border-gray-200 w-full text-center relative overflow-hidden">
                                <h1 className={`text-[8rem] font-black leading-none mb-4 ${module.id === 'm1' ? 'text-rose-500' : module.id === 'm2' ? 'text-cyan-500' : 'text-amber-500'}`}>
                                    {activeItem.letter || activeItem.syllable}
                                </h1>
                                
                                {module.type === 'letter' && <div className="text-4xl font-bold text-gray-500">Nama: "{activeItem.sound}"</div>}
                                {module.type === 'phonics' && (
                                    <>
                                        <div className="text-5xl font-bold text-gray-800 mb-2">"{activeItem.sound}"</div>
                                        <div className="text-2xl text-gray-500 bg-gray-100 inline-block px-6 py-2 rounded-full">{activeItem.desc}</div>
                                    </>
                                )}

                                {/* BAHAGIAN BUKU CERITA (Hanya untuk Suku Kata) */}
                                {module.type === 'syllable' && activeItem.story && (
                                    <div className="mt-10 bg-amber-50 rounded-3xl p-8 border-4 border-amber-200 text-left relative">
                                        <div className="absolute -top-6 left-8 bg-amber-400 text-white px-6 py-2 rounded-full font-bold text-xl flex items-center shadow-lg">
                                            📚 Buku Cerita
                                        </div>
                                        <p className="text-3xl font-semibold text-gray-800 mt-6 leading-relaxed">
                                            {activeItem.story}
                                        </p>
                                        <button 
                                            onClick={() => speakText(activeItem.story, 0.75)}
                                            className="btn-3d mt-6 bg-green-400 text-white px-8 py-4 rounded-2xl font-bold text-xl w-full flex justify-center items-center gap-3"
                                        >
                                            🔊 Tolong Bacakan
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* FASA KUIZ GAMIFIED */}
                    {phase === 'quiz' && (
                        <div className="w-full max-w-3xl animate-pop">
                            {/* Progress Bar */}
                            <div className="w-full bg-gray-200 rounded-full h-6 mb-8 border-4 border-white shadow-inner">
                                <div className="bg-green-400 h-full rounded-full transition-all duration-500" style={{ width: `${((quizIndex) / module.quiz.length) * 100}%` }}></div>
                            </div>

                            <div className="bg-white rounded-[3rem] p-10 shadow-2xl border-b-8 border-indigo-200 text-center">
                                <h2 className="text-4xl font-bold text-gray-800 mb-12" onClick={() => speakText(module.quiz[quizIndex].q)}>
                                    {module.quiz[quizIndex].q} 🔊
                                </h2>
                                <div className="grid grid-cols-3 gap-6">
                                    {module.quiz[quizIndex].opt.map((opt, idx) => (
                                        <button 
                                            key={idx} 
                                            onClick={() => handleQuizAnswer(opt)} 
                                            className="btn-3d bg-indigo-50 hover:bg-indigo-100 border-4 border-indigo-200 rounded-3xl p-8 text-5xl font-black text-indigo-600"
                                        >
                                            {opt}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* FASA RESULT (Ada Konfeti) */}
                    {phase === 'result' && (
                        <div className="w-full max-w-2xl animate-pop bg-white p-12 rounded-[3rem] shadow-2xl border-b-8 border-green-200 text-center relative overflow-hidden">
                            {/* Efek Konfeti Emoji */}
                            {Math.round((quizScore / module.quiz.length) * 100) >= 80 && (
                                <div className="absolute inset-0 pointer-events-none opacity-50 text-6xl">
                                    {['🎉','⭐','🎈','✨','🎊'].map((emoji, i) => (
                                        <div key={i} className="absolute" style={{ 
                                            left: `${Math.random() * 100}%`, 
                                            animation: `float-up ${2 + Math.random()*2}s ease-in infinite` 
                                        }}>{emoji}</div>
                                    ))}
                                </div>
                            )}

                            <div className="text-[8rem] mb-4 animate-bounce-slow relative z-10">
                                {Math.round((quizScore / module.quiz.length) * 100) >= 80 ? '🏆' : '💪'}
                            </div>
                            <h2 className={`text-6xl font-black relative z-10 ${Math.round((quizScore / module.quiz.length) * 100) >= 80 ? 'text-green-500' : 'text-orange-500'}`}>
                                Markah: {Math.round((quizScore / module.quiz.length) * 100)}%
                            </h2>
                            
                            <button 
                                onClick={() => { onComplete(Math.round((quizScore / module.quiz.length) * 100)); }} 
                                className="btn-3d mt-10 bg-indigo-500 text-white px-12 py-6 rounded-full font-black text-2xl relative z-10 w-full"
                            >
                                Kembali ke Peta 🗺️
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        // --- APP UTAMA ---
        const App = () => {
            const [screen, setScreen] = useState('home');
            const [activeMod, setActiveMod] = useState(null);
            const [progress, setProgress] = useState({ m1: { status: 'unlocked' }, m2: { status: 'locked' }, m3: { status: 'locked' } });

            const startMod = (id) => {
                if (progress[id].status === 'locked') { speakText("Kunci! Habiskan yang sebelum ini."); return; }
                setActiveMod(id); setScreen('lesson');
            };

            const completeMod = (score) => {
                if (score >= 80) {
                    setProgress(prev => {
                        const next = { ...prev, [activeMod]: { status: 'completed' } };
                        const idx = MODULE_ORDER.indexOf(activeMod);
                        if (idx < MODULE_ORDER.length - 1) next[MODULE_ORDER[idx + 1]].status = 'unlocked';
                        return next;
                    });
                }
                setScreen('home');
            };

            return (
                <div className="min-h-screen">
                    {screen === 'home' && (
                        <div className="p-8 max-w-6xl mx-auto animate-pop">
                            <div className="bg-gradient-to-br from-indigo-500 to-purple-600 rounded-[3rem] p-12 text-white shadow-2xl mb-12 relative overflow-hidden border-b-8 border-indigo-700">
                                <h1 className="text-6xl font-black mb-4">🚀 Smart Start Kids</h1>
                                <p className="text-3xl font-medium opacity-90">Peta Pengembaraan Pintar</p>
                                <div className="absolute -bottom-10 -right-10 text-[12rem] opacity-30">🐻</div>
                            </div>

                            <div className="grid md:grid-cols-3 gap-8">
                                {MODULE_ORDER.map(id => {
                                    const mod = COURSE_DATA[id];
                                    const stat = progress[id].status;
                                    return (
                                        <div key={id} onClick={() => startMod(id)} 
                                            className={`btn-3d rounded-[2.5rem] p-8 border-b-8 text-center cursor-pointer 
                                            ${stat === 'locked' ? 'bg-gray-200 border-gray-300 grayscale opacity-80' : `bg-white ${mod.color.replace('bg-', 'border-')} shadow-xl`}`}
                                        >
                                            <div className="text-[6rem] mb-4">{id === 'm1' ? '🅰️' : id === 'm2' ? '🔊' : '📚'}</div>
                                            <h3 className="text-3xl font-bold text-gray-800">{mod.title}</h3>
                                            <div className="mt-6">
                                                {stat === 'locked' ? <span className="text-4xl">🔒</span> : stat === 'completed' ? <span className="text-4xl">✅</span> : <span className="text-2xl bg-green-100 text-green-700 px-6 py-2 rounded-full font-bold">Buka</span>}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}
                    {screen === 'lesson' && <LessonViewer module={COURSE_DATA[activeMod]} onComplete={completeMod} onExit={() => setScreen('home')} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
