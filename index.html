<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Start Kids</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Fungsi Audio
        const speakText = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'ms-MY';
                window.speechSynthesis.speak(u);
            }
        };

        // --- KOMPONEN UTAMA ---
        const App = () => {
            const [page, setPage] = useState('home');
            const [moduleData, setModuleData] = useState(null);
            const [score, setScore] = useState(0);

            // Mock Data Mudah
            const startQuiz = () => {
                setScore(0);
                setPage('quiz');
            };

            const finishQuiz = (finalScore) => {
                setScore(finalScore);
                setPage('result');
            };

            // Render Dashboard
            if (page === 'home') {
                return (
                    <div className="min-h-screen bg-blue-50 flex flex-col items-center justify-center p-8">
                        <h1 className="text-5xl font-black text-blue-600 mb-8">🌈 Smart Start Kids</h1>
                        <button 
                            onClick={startQuiz}
                            className="bg-orange-500 text-white px-12 py-6 rounded-full text-2xl font-bold hover:scale-105 transition-all"
                        >
                            Mula Belajar
                        </button>
                    </div>
                );
            }

            // Render Kuiz
            if (page === 'quiz') {
                return (
                    <div className="min-h-screen bg-yellow-50 flex flex-col items-center justify-center p-8">
                        <h2 className="text-3xl font-bold mb-8">Soalan: Berapakah 1 + 1?</h2>
                        <div className="grid grid-cols-2 gap-4">
                            <button onClick={() => finishQuiz(0)} className="bg-red-200 p-8 rounded-2xl text-2xl">3</button>
                            <button onClick={() => finishQuiz(100)} className="bg-green-200 p-8 rounded-2xl text-2xl">2</button>
                        </div>
                    </div>
                );
            }

            // Render Result (Dibuat sangat ringkas untuk elak error)
            if (page === 'result') {
                return (
                    <div className="min-h-screen bg-green-50 flex flex-col items-center justify-center p-8 text-center">
                        <div className="text-8xl mb-4">🏆</div>
                        <h2 className="text-4xl font-black text-green-700 mb-4">Selesai!</h2>
                        <p className="text-2xl mb-8">Markah anda: {score}%</p>
                        <button 
                            onClick={() => setPage('home')}
                            className="bg-blue-500 text-white px-8 py-4 rounded-full font-bold"
                        >
                            Kembali ke Menu
                        </button>
                    </div>
                );
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
